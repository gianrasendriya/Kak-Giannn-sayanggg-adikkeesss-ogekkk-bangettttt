<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Untuk Ogek ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align:center;
  color:white;
}
h1{
  font-family: 'Great Vibes', cursive;
  font-size:60px;
  margin:0;
  animation:fadeIn 2s;
}
p{
  font-size:20px;
}
button{
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:white;
  color:#ff4b6e;
  cursor:pointer;
  transition:0.3s;
  margin-top:20px;
}
button:hover{
  transform:scale(1.1);
}
#message{
  margin-top:25px;
  font-size:22px;
  max-width:600px;
  opacity:0;
  transition:1s;
}
.heart{
  position:absolute;
  color:red;
  font-size:20px;
  animation:fall linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10vh); opacity:1;}
100%{transform:translateY(110vh); opacity:0;}
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1; transform:translateY(0);}
}
img.slideshow{
  width:250px;
  height:250px;
  object-fit:cover;
  border-radius:20px;
  margin-top:20px;
  opacity:0;
  transition:1s;
}
</style>
</head>
<body><h1>Hi Ogek ❤️</h1>
<p>Aku punya sesuatu untuk kamu...</p>
<button onclick="showLove()">Buka Pesan</button><div id="message">
Ogek, terima kasih sudah hadir di hidupku. <br>
Setiap hari bersamamu selalu terasa spesial. <br>
Semoga kita terus bersama, melewati hari-hari dengan tawa dan cerita baru. ❤️
</div><img class="slideshow" src="https://via.placeholder.com/250" id="slide"><audio id="music" src="https://www.bensound.com/bensound-music/bensound-sunny.mp3"></audio>

<script>
function showLove(){
  let msg = document.getElementById("message");
  msg.style.opacity="1";
  createHearts();
  startSlideshow();
  document.getElementById("music").play();
}

function createHearts(){
  for(let i=0;i<30;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+2)+"s";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},5000);
  }
}

let images = [
  "https://via.placeholder.com/250?text=Moment+1",
  "https://via.placeholder.com/250?text=Moment+2",
  "https://via.placeholder.com/250?text=Moment+3"
];
let slideIndex=0;
function startSlideshow(){
  let slide = document.getElementById("slide");
  slide.style.opacity=1;
  setInterval(()=>{
    slideIndex = (slideIndex+1)%images.length;
    slide.src=images[slideIndex];
  },3000);
}
</script></body>
</html>
